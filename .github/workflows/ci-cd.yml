name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Triggers on every push to main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: 418295709281.dkr.ecr.eu-north-1.amazonaws.com/sample/helloapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Build + Sonar
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.NEW_SONAR_TOKEN }}
        run: mvn clean verify sonar:sonar -Dsonar.token=$SONAR_TOKEN

      # Step 4: Skipped - already built above, just package for Docker
      - name: Package (skip tests, already ran)
        run: mvn package -DskipTests

      # Step 5: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Build Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo-v4:latest .

      # Step 6: Push to Docker Hub
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-ci-demo-v4:latest

      # Step 7: Deploy to ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step: Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          # username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop old container
            docker stop springboot-app || true
            docker rm springboot-app || true

            # Login to ECR
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ env.ECR_REPOSITORY }}

            # Pull latest image
            docker pull ${{ env.ECR_REPOSITORY }}:latest

            # Run container
            docker run -d -p 8080:8080 --name springboot-app ${{ env.ECR_REPOSITORY }}:latest
